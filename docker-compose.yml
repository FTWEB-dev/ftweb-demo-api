services:
  app:
    build: .
    ports:
      - '8080:8080'
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/ftwebdb
      SPRING_DATASOURCE_USERNAME: ftweb
      SPRING_DATASOURCE_PASSWORD: ftweb
    depends_on:
      - db
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ftwebdb
      MYSQL_USER: ftweb
      MYSQL_PASSWORD: ftweb
      MYSQL_ROOT_PASSWORD: ftweb
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: